# Full-scale symbolic planner config — 8x A100
model:
  vocab_size: 512
  d_model: 512
  n_heads: 16
  n_layers_enc: 6
  n_layers_dec: 12
  d_ff: 2048
  max_len: 4096
  dropout: 0.1

training:
  batch_size: 16
  grad_accum: 2
  lr: 2.0e-4
  lr_min: 1.0e-5
  warmup_steps: 2000
  max_steps: 200000
  max_seq_len: 2048
  clip_grad: 1.0
  weight_decay: 0.01
  save_every: 5000
  eval_every: 2000
  log_every: 100

paths:
  train_tokens: data/subsets/train_tokens.json
  val_tokens:   data/subsets/val_tokens.json
  checkpoint:   checkpoints/symbolic_full/
  runs:         runs/symbolic_full/

device: auto
amp: true
multi_gpu: true
